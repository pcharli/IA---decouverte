<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Découvrir Bruxelles</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page">

<header class="header">

  <nav class="nav">

    <a class="nav__link" href="contact.html">Contact</a>

<main class="main">
    <img src="./images/bruxelles.avif" alt="Grand Place de Bruxelles">

  <section class="places">

    <ul id="liste" class="places__list">

<footer class="footer">
  <p class="footer__copyright">
    © 2026 Découvrir Bruxelles

</footer>
