<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Contact - Découvrir Bruxelles</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page">

<header class="header">
  <h1 class="header__title">Découvrir Bruxelles</h1>

  <nav class="nav">
    <a class="nav__link" href="index.html">Accueil</a>
    <a class="nav__link" href="contact.html">Contact</a>
  </nav>
</header>

<main class="main">

  <section class="contact">
    <h2 class="contact__title">Contactez-nous</h2>

    <form id="contact-form" class="contact__form">

      <div class="contact__field">
        <label class="contact__label" for="name">Nom</label>
        <input class="contact__input" id="name" type="text" required>
      </div>

      <div class="contact__field">
        <label class="contact__label" for="email">Email</label>
        <input class="contact__input" id="email" type="email" required>
      </div>

      <div class="contact__field">
        <label class="contact__label" for="message">Message</label>
        <textarea class="contact__textarea" id="message" rows="4"></textarea>
      </div>

      <button class="contact__button" type="submit">
        Envoyer
      </button>

    </form>

  </section>

</main>

<footer class="footer">
  <p class="footer__copyright">
    © 2026 Découvrir Bruxelles
  </p>
</footer>

<script src="./main.js"></script>

</body>
</html>
